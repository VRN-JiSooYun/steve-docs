<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steve Docs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: #6e6e73;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }

    .doc-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }

    .doc-list a {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #ffffff;
      border: 1px solid #e0e0e5;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
    }

    .doc-list a:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }

    .doc-icon {
      font-size: 1.75rem;
      flex-shrink: 0;
    }

    .doc-info .doc-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .doc-info .doc-desc {
      font-size: 0.85rem;
      color: #6e6e73;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <h1>Steve Docs</h1>
  <p class="subtitle">문서를 선택하세요</p>

  <ul class="doc-list">
    <li>
      <a href="molstar_interaction_kinds.html">
        <span class="doc-icon">🧬</span>
        <div class="doc-info">
          <div class="doc-title">Molstar Interaction Kinds</div>
          <div class="doc-desc">Mol* 분자 뷰어의 인터랙션 종류 정리</div>
        </div>
      </a>
    </li>
  </ul>
</body>
</html>
